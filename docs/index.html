<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <link rel="manifest" href="manifest.json">
    <title>电气计算工具</title>
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0;
            --pass: #0d904f; --fail: #d93025;
            --bg: #f0f2f5; --card: #fff; --text: #202124; --text2: #5f6368;
            --border: #e0e0e0; --radius: 12px; --shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            max-width: 520px; margin: 0 auto; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: #fff; padding: 16px; text-align: center;
            position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 1.15rem; font-weight: 700; }
        .header span { font-size: 0.7rem; opacity: 0.85; }
        .content { padding: 10px; }

        .section-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
        .section-toggle button {
            flex:1; padding: 12px; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            background: var(--card); color: var(--text);
            box-shadow: var(--shadow); transition: 0.2s;
        }
        .section-toggle button.active { background: var(--primary); color: #fff; }
        .section { display: none; }
        .section.active { display: block; }

        .card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
        .card h3 { font-size: 0.95rem; margin-bottom: 10px; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 8px; }

        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 3px; font-weight: 500; }
        input, select {
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.9rem; background: #fafafa; color: var(--text);
            -webkit-appearance: none; appearance: none;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); background: #fff; }
        .form-row { display: flex; gap: 8px; }
        .form-row > * { flex: 1; }
        .form-row-3 { display: flex; gap: 8px; }
        .form-row-3 > * { flex: 1; }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 8px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:active { background: var(--primary-dark); transform: scale(0.98); }

        .result { margin-top: 10px; }
        .rtable { width: 100%; font-size: 0.82rem; border-collapse: collapse; }
        .rtable td { padding: 6px 4px; border-bottom: 1px solid #f0f0f0; }
        .rtable td:first-child { color: var(--text2); width: 42%; }
        .rtable td:last-child { font-weight: 500; text-align: right; }
        .highlight { font-size: 1.05rem; font-weight: 700; color: var(--primary); }
        .pass { color: var(--pass); font-weight: 700; }
        .fail { color: var(--fail); font-weight: 700; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
        .badge-ok { background: #e6f4ea; color: var(--pass); }
        .badge-no { background: #fce8e6; color: var(--fail); }

        .verdict { text-align: center; padding: 14px; border-radius: var(--radius); margin-top: 8px; }
        .verdict.all-pass { background: #e6f4ea; color: var(--pass); }
        .verdict.has-fail { background: #fce8e6; color: var(--fail); }
        .verdict .icon { font-size: 1.8rem; }
        .verdict .msg { font-size: 1rem; font-weight: 700; margin-top: 2px; }
        .cable-tag {
            display: inline-block; background: #e8f0fe; color: var(--primary);
            padding: 5px 14px; border-radius: 20px; font-weight: 700; font-size: 0.88rem; margin-top: 6px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>电气设计计算工具</h1>
    <span>GB 50217 / GB 50054 | 工业与民用配电设计手册</span>
</div>

<div class="content">
    <div class="section-toggle">
        <button class="active" onclick="switchSection('lv')">低压 0.6/1kV</button>
        <button onclick="switchSection('hv')">高压 10/24/35kV</button>
    </div>

    <!-- ==================== 低压 ==================== -->
    <div id="section-lv" class="section active">
        <div class="card">
            <h3>负荷参数</h3>
            <div class="form-row">
                <div class="form-group"><label>设备功率 P_e (kW)</label><input id="lv_pe" type="number" value="150" step="any"></div>
                <div class="form-group"><label>需用系数 Kx</label><input id="lv_kx" type="number" value="0.85" step="0.01" min="0.1" max="1"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>功率因数 cosφ</label><input id="lv_cosphi" type="number" value="0.88" step="0.01" min="0.1" max="1"></div>
                <div class="form-group">
                    <label>相数 / 电压</label>
                    <select id="lv_phase">
                        <option value="3-380">三相 380V</option>
                        <option value="3-660">三相 660V</option>
                        <option value="1-220">单相 220V</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>电缆参数 <span style="font-size:0.7rem;color:var(--text2)">(工业与民用配电设计手册 第四版)</span></h3>
            <div class="form-row">
                <div class="form-group">
                    <label>电缆型号</label>
                    <select id="lv_model" onchange="lvModelChange()">
                        <option value="YJV">YJV - XLPE绝缘 PVC护套 (铜)</option>
                        <option value="YJLV">YJLV - XLPE绝缘 PVC护套 (铝)</option>
                        <option value="ZR-YJV">ZR-YJV - 阻燃型 XLPE (铜)</option>
                        <option value="NH-YJV">NH-YJV - 耐火型 XLPE (铜)</option>
                        <option value="WDZ-YJY">WDZ-YJY - 低烟无卤 XLPE (铜)</option>
                        <option value="YJV22">YJV22 - XLPE绝缘 钢带铠装 (铜)</option>
                        <option value="YJLV22">YJLV22 - XLPE绝缘 钢带铠装 (铝)</option>
                        <option value="VV">VV - PVC绝缘 PVC护套 (铜)</option>
                        <option value="VLV">VLV - PVC绝缘 PVC护套 (铝)</option>
                        <option value="VV22">VV22 - PVC绝缘 钢带铠装 (铜)</option>
                        <option value="VLV22">VLV22 - PVC绝缘 钢带铠装 (铝)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>电缆芯数</label>
                    <select id="lv_cores">
                        <option value="1">单芯 (1P)</option>
                        <option value="3">三芯 (3P)</option>
                        <option value="4" selected>四芯 (3P+N)</option>
                        <option value="5">五芯 (3P+N+PE)</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>敷设方式</label><select id="lv_method"><option value="bridge">桥架敷设</option><option value="air">空气中明敷</option><option value="conduit">穿管敷设</option><option value="buried">直埋敷设</option></select></div>
            <div class="form-row-3">
                <div class="form-group"><label>环境温度 (°C)</label><input id="lv_temp" type="number" value="35"></div>
                <div class="form-group"><label>并列回路数</label><input id="lv_circuits" type="number" value="2" min="1"></div>
                <div class="form-group"><label>距离 (m)</label><input id="lv_length" type="number" value="120"></div>
            </div>
            <div class="form-group"><label>回路类型</label><select id="lv_ctype"><option value="power">动力 (5%)</option><option value="lighting">照明 (3%)</option><option value="mixed">混合 (4%)</option><option value="emergency">应急 (10%)</option></select></div>
            <input type="hidden" id="lv_conductor" value="copper">
            <input type="hidden" id="lv_insulation" value="xlpe">
        </div>

        <button class="btn btn-primary" onclick="calcLV()">低压综合计算</button>
        <div id="result-lv" class="result hidden"></div>
    </div>

    <!-- ==================== 高压 ==================== -->
    <div id="section-hv" class="section">
        <div class="card">
            <h3>负荷参数</h3>
            <div class="form-row">
                <div class="form-group"><label>设备功率 P_e (kW)</label><input id="hv_pe" type="number" value="5000" step="any"></div>
                <div class="form-group"><label>需用系数 Kx</label><input id="hv_kx" type="number" value="0.9" step="0.01"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>功率因数 cosφ</label><input id="hv_cosphi" type="number" value="0.9" step="0.01"></div>
                <div class="form-group">
                    <label>电压等级</label>
                    <select id="hv_voltage">
                        <option value="10000">10kV</option>
                        <option value="24000">24kV</option>
                        <option value="35000">35kV</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>电缆参数</h3>
            <div class="form-row">
                <div class="form-group"><label>导体材料</label><select id="hv_conductor"><option value="copper">铜芯</option><option value="aluminum">铝芯</option></select></div>
                <div class="form-group"><label>绝缘类型</label><select id="hv_insulation"><option value="xlpe">XLPE</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>敷设方式</label><select id="hv_method"><option value="air">空气中明敷</option><option value="buried">直埋敷设</option><option value="conduit">排管敷设</option></select></div>
                <div class="form-group"><label>电缆芯数</label><select id="hv_cores"><option value="3" selected>三芯</option></select></div>
            </div>
            <div class="form-row-3">
                <div class="form-group"><label>环境温度 (°C)</label><input id="hv_temp" type="number" value="35"></div>
                <div class="form-group"><label>并列回路数</label><input id="hv_circuits" type="number" value="1" min="1"></div>
                <div class="form-group"><label>距离 (m)</label><input id="hv_length" type="number" value="2000"></div>
            </div>
        </div>

        <div class="card">
            <h3>短路参数</h3>
            <div class="form-row">
                <div class="form-group"><label>短路电流 I"k3 (kA)</label><input id="hv_ik" type="number" value="16" step="any"></div>
                <div class="form-group"><label>持续时间 t (s)</label><input id="hv_t" type="number" value="0.5" step="0.01"></div>
            </div>
            <div class="form-group"><label>冲击系数 K_p (动稳定)</label>
                <select id="hv_kp"><option value="1.8" selected>1.8 (一般高压系统)</option><option value="1.9">1.9</option><option value="1.65">1.65</option></select>
            </div>
        </div>

        <button class="btn btn-primary" onclick="calcHV()">高压综合计算</button>
        <div id="result-hv" class="result hidden"></div>
    </div>
</div>

<script>
function $(id) { return document.getElementById(id); }
function fv(id) { return parseFloat($(id).value); }
function badge(ok) { return ok ? '<span class="badge badge-ok">合格</span>' : '<span class="badge badge-no">不合格</span>'; }

function buildCard(title, rows) {
    let h = '<div class="card"><div class="result-section"><h4>'+title+'</h4><table class="rtable">';
    for (const [l,v] of rows) h += '<tr><td>'+l+'</td><td>'+v+'</td></tr>';
    return h + '</table></div></div>';
}

function switchSection(s) {
    document.querySelectorAll('.section-toggle button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(p => p.classList.remove('active'));
    if (s === 'lv') {
        document.querySelector('.section-toggle button:first-child').classList.add('active');
        $('section-lv').classList.add('active');
    } else {
        document.querySelector('.section-toggle button:last-child').classList.add('active');
        $('section-hv').classList.add('active');
    }
}

// 电缆型号 → 导体+绝缘 映射
const CABLE_MODELS = {
    'YJV':     {conductor:'copper', insulation:'xlpe', armor:false},
    'YJLV':    {conductor:'aluminum', insulation:'xlpe', armor:false},
    'ZR-YJV':  {conductor:'copper', insulation:'xlpe', armor:false},
    'NH-YJV':  {conductor:'copper', insulation:'xlpe', armor:false},
    'WDZ-YJY': {conductor:'copper', insulation:'xlpe', armor:false},
    'YJV22':   {conductor:'copper', insulation:'xlpe', armor:true},
    'YJLV22':  {conductor:'aluminum', insulation:'xlpe', armor:true},
    'VV':      {conductor:'copper', insulation:'pvc', armor:false},
    'VLV':     {conductor:'aluminum', insulation:'pvc', armor:false},
    'VV22':    {conductor:'copper', insulation:'pvc', armor:true},
    'VLV22':   {conductor:'aluminum', insulation:'pvc', armor:true},
};

function lvModelChange() {
    const m = CABLE_MODELS[$('lv_model').value];
    if (m) {
        $('lv_conductor').value = m.conductor;
        $('lv_insulation').value = m.insulation;
        // 铠装型号自动建议直埋
        if (m.armor && $('lv_method').value === 'bridge') {
            // 不强制改，给用户提示即可
        }
    }
}

// ============================================================
// 低压载流量 (GB 50217)
// ============================================================
const LV_CU_XLPE = {
    air: {1.5:22,2.5:30,4:40,6:51,10:71,16:96,25:127,35:158,50:192,70:246,95:301,120:346,150:399,185:456,240:538,300:621,400:741,500:852,630:981},
    bridge: {1.5:21,2.5:28,4:37,6:47,10:66,16:89,25:118,35:147,50:178,70:228,95:279,120:320,150:370,185:423,240:500,300:577,400:688,500:790,630:910},
    conduit: {1.5:18,2.5:24,4:32,6:41,10:56,16:76,25:100,35:123,50:150,70:188,95:230,120:265,150:305,185:350,240:415,300:475,400:550,500:630,630:720},
    buried: {1.5:26,2.5:35,4:46,6:58,10:79,16:103,25:134,35:162,50:194,70:243,95:293,120:335,150:379,185:430,240:502,300:572,400:667,500:760,630:860}
};
const LV_CU_PVC = {
    air: {1.5:18,2.5:25,4:32,6:42,10:59,16:79,25:105,35:130,50:158,70:204,95:252,120:292,150:337,185:386,240:456,300:527,400:618,500:710,630:815},
    conduit: {1.5:15,2.5:20,4:27,6:35,10:48,16:65,25:85,35:105,50:128,70:163,95:200,120:230,150:265,185:304,240:360,300:410,400:470,500:530,630:590},
    buried: {1.5:22,2.5:30,4:39,6:49,10:67,16:88,25:115,35:140,50:169,70:214,95:260,120:298,150:338,185:385,240:452,300:515,400:590,500:660,630:720}
};

function al(d) { const r={}; for(const[k,v] of Object.entries(d)) r[k]=Math.round(v*0.78*10)/10; return r; }

function getLVAmpacity(conductor, insulation, method, cores) {
    let base;
    if (insulation === 'xlpe') {
        const t = LV_CU_XLPE;
        base = method==='air' ? t.air : (method==='bridge' ? t.bridge : (method==='conduit' ? t.conduit : t.buried));
    } else {
        const t = LV_CU_PVC;
        if (method==='bridge') { base = al(LV_CU_XLPE.bridge); }
        else { base = method==='air' ? t.air : (method==='conduit' ? t.conduit : t.buried); }
    }
    if (conductor === 'aluminum') base = al(base);
    // 多芯修正 (工业与民用配电设计手册 表9.4)
    // 单芯: 散热好, 载流量略高; 多芯: 相互加热, 需折减
    const coreF = {1:1.05, 3:1.0, 4:0.88, 5:0.82};
    const cf = coreF[cores] || 1.0;
    const r = {};
    for (const [k,v] of Object.entries(base)) r[k] = Math.round(v*cf*10)/10;
    return r;
}

// 温度修正
const TP={10:1.22,15:1.17,20:1.12,25:1.06,30:1.00,35:0.94,40:0.87,45:0.79,50:0.71};
const TX={10:1.18,15:1.14,20:1.10,25:1.05,30:1.00,35:0.95,40:0.90,45:0.85,50:0.80,55:0.74,60:0.68};
const TBP={10:1.10,15:1.05,20:1.00,25:0.95,30:0.89,35:0.84,40:0.77};
const TBX={10:1.11,15:1.07,20:1.03,25:0.99,30:0.94,35:0.90,40:0.85};

function interp(t,v) {
    const k=Object.keys(t).map(Number).sort((a,b)=>a-b);
    if(v<=k[0])return t[k[0]]; if(v>=k[k.length-1])return t[k[k.length-1]];
    for(let i=0;i<k.length-1;i++){if(k[i]<=v&&v<=k[i+1]){const r=(v-k[i])/(k[i+1]-k[i]);return t[k[i]]+(t[k[i+1]]-t[k[i]])*r;}}
    return 1;
}
function getTemp(ins,met,t) { return met==='buried'? interp(ins==='xlpe'?TBX:TBP,t) : interp(ins==='xlpe'?TX:TP,t); }
function getMf(m) { return {air:1, bridge:0.93, conduit:0.80, buried:1.05}[m]||1; }
const GA={1:1,2:0.87,3:0.81,4:0.75,5:0.70,6:0.66,8:0.60,10:0.55};
const GB={1:1,2:0.85,3:0.75,4:0.70,5:0.65,6:0.60};
function getGrp(m,n) { if(n<=1)return 1; const t=m==='buried'?GB:GA; if(n in t)return t[n]; const k=Object.keys(t).map(Number).sort((a,b)=>a-b); if(n>=k[k.length-1])return t[k[k.length-1]]; for(let i=0;i<k.length-1;i++){if(k[i]<=n&&n<=k[i+1])return t[k[i]];} return 1; }

// 低压阻抗
const ZLC={1.5:[14.80,.110],2.5:[8.88,.106],4:[5.55,.102],6:[3.70,.099],10:[2.246,.098],16:[1.404,.094],25:[.898,.091],35:[.642,.089],50:[.449,.085],70:[.321,.082],95:[.236,.080],120:[.187,.078],150:[.150,.077],185:[.121,.076],240:[.094,.075],300:[.077,.074],400:[.059,.073],500:[.047,.072],630:[.038,.071]};
const ZLA={1.5:[24.20,.110],2.5:[14.52,.106],4:[9.07,.102],6:[6.05,.099],10:[3.67,.098],16:[2.30,.094],25:[1.47,.091],35:[1.05,.089],50:[.735,.085],70:[.525,.082],95:[.387,.080],120:[.306,.078],150:[.245,.077],185:[.199,.076],240:[.153,.075],300:[.126,.074],400:[.097,.073],500:[.077,.072],630:[.062,.071]};

function zGet(t, s) { const k=Object.keys(t).map(Number).sort((a,b)=>a-b); let b=k[0]; for(const x of k) if(Math.abs(x-s)<Math.abs(b-s)) b=x; return t[b]; }

const KV={copper_pvc:115,copper_xlpe:143,aluminum_pvc:76,aluminum_xlpe:95};

// ============================================================
// 高压载流量 (GB 50217)
// ============================================================
const HC10={air:{25:140,35:170,50:205,70:260,95:318,120:367,150:418,185:478,240:563,300:646,400:770,500:882,630:1012},buried:{25:137,35:165,50:197,70:246,95:296,120:338,150:380,185:432,240:504,300:573,400:667,500:755,630:850}};
const HC35={air:{50:180,70:228,95:278,120:320,150:365,185:418,240:490,300:560,400:660,500:755,630:860},buried:{50:172,70:215,95:258,120:295,150:334,185:380,240:443,300:504,400:586,500:663,630:745}};

function getHVAmpacity(conductor, voltage, method) {
    let b;
    if (voltage===10000) { b = (method==='buried'||method==='conduit') ? HC10.buried : HC10.air; }
    else if (voltage===24000) { b = (method==='buried'||method==='conduit') ? HC10.buried : HC10.air; const r={}; for(const[k,v] of Object.entries(b)) r[k]=Math.round(v*0.92*10)/10; b=r; }
    else { b = (method==='buried'||method==='conduit') ? HC35.buried : HC35.air; }
    if (conductor==='aluminum') b=al(b);
    return b;
}

// 高压阻抗
const ZH10={25:[1.20,.130],35:[.868,.125],50:[.641,.120],70:[.459,.116],95:[.338,.112],120:[.268,.109],150:[.214,.106],185:[.174,.103],240:[.135,.100],300:[.110,.098],400:[.085,.095],500:[.068,.093],630:[.055,.091]};
const ZH35={50:[.641,.130],70:[.459,.126],95:[.338,.122],120:[.268,.118],150:[.214,.115],185:[.174,.112],240:[.135,.108],300:[.110,.105],400:[.085,.102],500:[.068,.100],630:[.055,.098]};
function zGetHV(v,s) { const t=v===35000?ZH35:ZH10; return zGet(t,s); }

// 动稳定允许峰值 (kA)
const DC={25:16,35:22,50:30,70:40,95:55,120:65,150:80,185:100,240:125,300:155,400:195,500:240,630:290};
const DA={25:10,35:14,50:19,70:25,95:35,120:42,150:52,185:65,240:80,300:100,400:126,500:155,630:188};
function dynRating(con,s) { return zGet(con==='copper'?DC:DA, s); }

function peakCurrent(ik,kp) { return Math.sqrt(2)*kp*ik; }

// ============================================================
// 低压综合计算
// ============================================================
function calcLV() {
    const model = $('lv_model').value;
    const cm = CABLE_MODELS[model] || {conductor:'copper', insulation:'xlpe'};
    const conductor = cm.conductor;
    const insulation = cm.insulation;

    const pe=fv('lv_pe'), kx=fv('lv_kx'), cosphi=fv('lv_cosphi');
    const [ph,vstr]=$('lv_phase').value.split('-');
    const is3=ph==='3', V=parseFloat(vstr);
    const method=$('lv_method').value, cores=parseInt($('lv_cores').value);
    const temp=fv('lv_temp'), circuits=fv('lv_circuits'), length=fv('lv_length');
    const ctype=$('lv_ctype').value;

    const pjs=pe*kx;
    let ijs, labelPhase;
    if(is3) {
        ijs=pjs*1000/(Math.sqrt(3)*V*cosphi);
        labelPhase='三相 '+V+'V';
    } else {
        ijs=pjs*1000/(V*cosphi);
        labelPhase='单相 '+V+'V';
    }
    const qjs=pjs*Math.tan(Math.acos(cosphi)), sjs=pjs/cosphi;

    // Cable
    const ampTable=getLVAmpacity(conductor,insulation,method,cores);
    const kT=getTemp(insulation,method,temp), kM=getMf(method), kG=getGrp(method,circuits);
    const kTotal=kT*kM*kG, required=ijs/kTotal;
    let cs=0,cRaw=0,cOk=false,cFail='';
    const secs=Object.keys(ampTable).map(Number).sort((a,b)=>a-b);
    for(const s of secs){if(ampTable[s]>=required){cs=s;cRaw=ampTable[s];cOk=true;break;}}
    if(!cOk){const ms=secs[secs.length-1];cFail='最大截面 '+ms+'mm2 不满足 ('+required.toFixed(1)+'A)';}

    // VD
    let vdDU=0,vdDUp=0,vdR0=0,vdX0=0,vdPass=false;
    if(cOk){
        const [r0,x0]=zGet(conductor==='copper'?ZLC:ZLA, cs);
        vdR0=r0;vdX0=x0;
        const sp=Math.sin(Math.acos(cosphi));
        vdDU=is3? (Math.sqrt(3)*ijs*length*(r0*cosphi+x0*sp)/1000) : (2*ijs*length*(r0*cosphi+x0*sp)/1000);
        vdDUp=is3? (vdDU/V*100) : (vdDU/V*100);
        const lim={lighting:3,power:5,mixed:4,emergency:10}[ctype]||5;
        vdPass=vdDUp<=lim;
    }

    // Render
    const coreLabel = {1:'单芯', 3:'三芯 (3P)', 4:'四芯 (3P+N)', 5:'五芯 (3P+N+PE)'}[cores] || (cores+'芯');
    const lim={lighting:3,power:5,mixed:4,emergency:10}[ctype]||5;
    const methodLabel={air:'空气中明敷',bridge:'桥架敷设',conduit:'穿管敷设',buried:'直埋敷设'}[method];

    let h='';
    h+=buildCard('1. 电流计算',[
        ['相别/电压', labelPhase],
        ['功率因数', cosphi.toFixed(2)],
        ['P_js / Q_js / S_js', pjs.toFixed(1)+' kW / '+qjs.toFixed(1)+' kvar / '+sjs.toFixed(1)+' kVA'],
        ['计算电流 I_js', '<span class="highlight">'+ijs.toFixed(2)+' A</span>']
    ]);
    if(cOk){
        const modelName = $('lv_model').value;
        h+=buildCard('2. 电缆选型 ('+modelName+' '+coreLabel+')',[
            ['电缆型号', modelName],
            ['芯数/敷设', coreLabel+' / '+methodLabel],
            ['温度Kt / 敷设Km / 并列Kg', kT.toFixed(3)+' / '+kM.toFixed(3)+' / '+kG.toFixed(3)],
            ['综合K / 要求载流量', kTotal.toFixed(3)+' / '+required.toFixed(1)+' A'],
            ['推荐截面', '<span class="highlight">'+cs+' mm2</span> (修正后: '+Math.round(cRaw*kTotal)+' A)'],
        ]);
    } else {
        h+=buildCard('2. 电缆选型',[['结果','<span class="fail">失败</span>'],['原因',cFail]]);
    }
    if(cOk){
        h+=buildCard('3. 压降校验 (限值 '+lim+'%)',[
            ['R0 / X0', vdR0.toFixed(4)+' / '+vdX0.toFixed(4)+' ohm/km'],
            ['dU / dU%', vdDU.toFixed(2)+' V / <span class="'+(vdPass?'pass':'fail')+'">'+vdDUp.toFixed(2)+'%</span>'],
            ['判定', badge(vdPass)]
        ]);
    }

    const allOk = cOk && vdPass;
    h+='<div class="verdict '+(allOk?'all-pass':'has-fail')+'"><div class="icon">'+(allOk?'PASS':'FAIL')+'</div><div class="msg">'+(allOk?'全部校验通过':'存在不合格项')+'</div>';
    if(allOk&&cOk){
        const modelName=$('lv_model').value;
        h+='<div class="cable-tag">'+modelName+'-0.6/1kV '+cs+'mm2 x '+cores+'芯</div>';
    }
    h+='</div>';
    $('result-lv').innerHTML=h;$('result-lv').classList.remove('hidden');$('result-lv').scrollIntoView({behavior:'smooth',block:'center'});
}

// ============================================================
// 高压综合计算
// ============================================================
function calcHV() {
    const pe=fv('hv_pe'), kx=fv('hv_kx'), cosphi=fv('hv_cosphi'), voltage=fv('hv_voltage');
    const conductor=$('hv_conductor').value, insulation=$('hv_insulation').value;
    const method=$('hv_method').value, cores=parseInt($('hv_cores').value);
    const temp=fv('hv_temp'), circuits=fv('hv_circuits'), length=fv('hv_length');
    const ik=fv('hv_ik'), tSec=fv('hv_t'), kp=fv('hv_kp');

    const pjs=pe*kx;
    const ijs=pjs*1000/(Math.sqrt(3)*voltage*cosphi);
    const vLabel=(voltage/1000).toFixed(0)+'kV';

    // Cable
    const ampTable=getHVAmpacity(conductor,voltage,method);
    const kT=getTemp(insulation,method,temp);
    const kM=method==='conduit'?0.85:(method==='buried'?1.05:1.0);
    const kG=getGrp(method,circuits);
    const kTotal=kT*kM*kG, required=ijs/kTotal;
    let cs=0,cRaw=0,cOk=false,cFail='';
    const secs=Object.keys(ampTable).map(Number).sort((a,b)=>a-b);
    for(const s of secs){if(ampTable[s]>=required){cs=s;cRaw=ampTable[s];cOk=true;break;}}
    if(!cOk){const ms=secs[secs.length-1];cFail='最大截面 '+ms+'mm2 不满足 ('+required.toFixed(1)+'A)';}

    // VD
    let vdDU=0,vdDUp=0,vdR0=0,vdX0=0,vdPass=false;
    if(cOk){const[r0,x0]=zGetHV(voltage,cs);vdR0=r0;vdX0=x0;const sp=Math.sin(Math.acos(cosphi));vdDU=Math.sqrt(3)*ijs*length*(r0*cosphi+x0*sp)/1000;vdDUp=vdDU/voltage*100;vdPass=vdDUp<=5;}

    // Thermal
    let smin=0,scPass=false,scK=0;
    if(cOk){scK=KV[conductor+'_'+insulation];smin=(ik*1000)*Math.sqrt(tSec)/scK;scPass=cs>=smin;}

    // Dynamic
    const ip=peakCurrent(ik,kp);
    let dynR=0,dynPass=false;
    if(cOk){dynR=dynRating(conductor,cs);dynPass=ip<=dynR;}

    // Render
    let h='';
    h+=buildCard('1. 高压电流计算',[['电压等级',vLabel],['功率因数',cosphi.toFixed(2)],['P_js',pjs.toFixed(1)+' kW'],['计算电流 I_js','<span class="highlight">'+ijs.toFixed(2)+' A</span>']]);
    if(cOk){h+=buildCard('2. 高压电缆选型',[['型号','ZR-YJV-'+vLabel+' '+cs+'mm2 '+cores+'芯 ('+(conductor==='copper'?'铜芯':'铝芯')+')'],['敷设方式',{air:'空气中明敷',buried:'直埋敷设',conduit:'排管敷设'}[method]||method],['综合K / 要求载流量',kTotal.toFixed(3)+' / '+required.toFixed(1)+' A'],['推荐截面','<span class="highlight">'+cs+' mm2</span> (基准: '+cRaw+' A)']]);}
    else{h+=buildCard('2. 高压电缆选型',[['结果','<span class="fail">失败</span>'],['原因',cFail]]);}
    if(cOk){h+=buildCard('3. 压降 (限值 5%)',[['R0/X0',vdR0.toFixed(4)+' / '+vdX0.toFixed(4)+' ohm/km'],['dU%','<span class="'+(vdPass?'pass':'fail')+'">'+vdDUp.toFixed(3)+'%</span>'],['判定',badge(vdPass)]]);}
    if(cOk){h+=buildCard('4. 热稳定校验',[['I\"k3 / t / K',ik+' kA / '+tSec+' s / '+scK],['S_min','<span class="'+(scPass?'pass':'fail')+'">'+smin.toFixed(1)+' mm2</span>'],['已选截面',cs+' mm2 '+badge(scPass)]]);}
    if(cOk){h+=buildCard('5. 动稳定校验',[['冲击系数 K_p',kp.toFixed(1)],['峰值电流 i_p','<span class="highlight">'+ip.toFixed(1)+' kA</span>'],['电缆允许峰值',dynR+' kA ('+cs+'mm2)'],['判定',badge(dynPass)+(dynPass?'':' 需升级截面')]]);}
    const allOk=cOk&&vdPass&&scPass&&dynPass;
    h+='<div class="verdict '+(allOk?'all-pass':'has-fail')+'"><div class="icon">'+(allOk?'PASS':'FAIL')+'</div><div class="msg">'+(allOk?'全部校验通过（含动稳定）':'存在不合格项')+'</div>';
    if(allOk&&cOk){h+='<div class="cable-tag">ZR-YJV-'+vLabel+' '+cs+'mm2 x '+cores+'芯</div>';}
    h+='</div>';
    $('result-hv').innerHTML=h;$('result-hv').classList.remove('hidden');$('result-hv').scrollIntoView({behavior:'smooth',block:'center'});
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
